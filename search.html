<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Jobs - JobFinder</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
    <div class="container">

        <div class="logo-image">
            <img class="logo-img" src="images/logo.jpg" alt="JobFinder Logo" style="height: 50px; width: 100px;">
        </div>

        <nav class="navbar">
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="jobs.html">Jobs</a></li>
                <li><a href="applied.html">Applied Jobs</a></li>
                <li><a href="search.html">Search</a></li>
            </ul>
        </nav>

    </div>
</header>


<main>

<section class="search-section">
<div class="container">

    <h1>Explore Jobs</h1>
    <p>Search for a job that matches your skills.</p>

    <form action="jobs.html" method="get">

        <div class="form-group">
            <label for="job_title">Job Title</label>
            <input 
                type="text" 
                id="job_title" 
                name="job_title" 
                placeholder="Enter job title or keyword"
                required
            >
        </div>
        <br><br>
        <div class="form-group">
            <label for="experience">Years of Experience</label>

            <select name="experience" id="experience">
                <option value="">Any</option>
                <option value="0-1">0 - 1 years</option>
                <option value="2-4">2 - 4 years</option>
                <option value="5+">5+ years</option>
            </select>
        </div>
        <br><br>
        <button type="submit" class="btn">Find Jobs</button>

    </form>

</div>
</section>

</main>

</body>
</html>
