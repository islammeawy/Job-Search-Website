{% extends 'base.html' %}
{% load static %}

{% block title %}Search Jobs - JobFinder{% endblock %}

{% block content %}
<section class="search-section">
    <div class="container">
        <h1>Search Jobs</h1>
        <p>Filter jobs by title, location, experience, and salary.</p>

        <form id="searchForm" method="get" action="{% url 'search' %}">

            <!-- Job Title -->
            <div class="form-group">
                <label for="job_title">Job Title</label>
                <input type="text" id="job_title" name="job_title"
                    placeholder="e.g., Developer, Designer, Manager"
                    value="{{ job_title|default:'' }}">
            </div>

            <!-- Location -->
            <div class="form-group">
                <label for="location">Location</label>
                <input type="text" id="location" name="location" placeholder="City, state, or 'Remote'"
                    value="{{ location|default:'' }}">
            </div>

            <!-- Experience -->
            <div class="form-group">
                <label for="experience">Years of Experience</label>
                <select name="experience" id="experience">
                    <option value="">Any</option>
                    <option value="0-1" {% if experience == '0-1' %}selected{% endif %}>0 - 1 years</option>
                    <option value="2-4" {% if experience == '2-4' %}selected{% endif %}>2 - 4 years</option>
                    <option value="5+" {% if experience == '5+' %}selected{% endif %}>5+ years</option>
                </select>
            </div>

            <!-- Salary Range (Optional) -->
            <div class="form-group">
                <label for="salary">Minimum Salary (Optional)</label>
                <input type="number" id="salary" name="salary" placeholder="e.g., 50000" min="0" step="1000"
                    value="{{ salary|default:'' }}">
            </div>

            <!-- Submit Button -->
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Search Jobs</button>
                <a href="{% url 'job_list' %}" class="btn btn-secondary">View All Jobs</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
